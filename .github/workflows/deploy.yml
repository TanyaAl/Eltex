name: Deploy to GitHub Pages
git config --global user.name "Deploy Bot"
git config --global user.email "deploy@myproject.com"

on:
  push:
    branches: ['main']

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
      - name: Install
        run: cd blog-app && npm install
      - name: Build
        run: cd blog-app && npm run build
      - name: Deploy
        run: cd blog-app && npm run deploy
        env:
          CI: true
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}