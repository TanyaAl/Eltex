<section class="hobby">
  <div class="hobby-grid">
    <h2 class="hobby-title">Hobby projects</h2>
    <p class="hobby-subtitle p21">
      Duis nisi do exercitation in irure aliqua commodo nisi eu id reprehenderit dolore fugiat
      consectetur irure labore est ea.
    </p>
    <div class="hobby-vert-group">
      @for (item of vertHobby; track item) {
        <div class="hobby-vert hide-info">
          <div class="hide-info-text">
            <h3>{{ item.title }}</h3>
            <p class="p16">{{ item.text }}</p>
          </div>
          <img [src]="item.img" alt="painting" />
        </div>
      }
    </div>
    <div class="hobby-goriz-group">
      @for (item of gorizHobby; track item) {
        <div class="hobby-goriz hide-info">
          <div class="hide-info-text">
            <h3>{{ item.title }}</h3>
            <p class="p16">{{ item.text }}</p>
          </div>
          <img [src]="item.img" alt="painting" />
        </div>
      }
    </div>
  </div>
</section>
