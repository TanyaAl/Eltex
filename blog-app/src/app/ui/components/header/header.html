<header>
  <nav class="nav-container">
    <div class="logo-title">Портфолио</div>
    <ul class="list-menu">
      <li routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        <a routerLink="/">Главная</a>
      </li>
      <li routerLinkActive="active"><a routerLink="/blog">Блог</a></li>
      <li><a [routerLink]="[]" fragment="footer">Контакты</a></li>
    </ul>
    <div class="hamburger-menu">
      <button class="menu-btn" (click)="toggleMenu()">
        <span></span>
      </button>
      <ul class="menu-box" [class.open]="isMenuOpen">
        <li class="p20" routerLinkActive="active">
          <a class="menu-item" routerLink="/" (click)="closeMenu()">Главная</a>
        </li>
        <li class="p20" routerLinkActive="active">
          <a class="menu-item" routerLink="/blog" (click)="closeMenu()">Блог</a>
        </li>
        <li class="p20">
          <a class="menu-item" [routerLink]="[]" fragment="footer" (click)="closeMenu()"
            >Контакты</a
          >
        </li>
      </ul>
    </div>
  </nav>
</header>
