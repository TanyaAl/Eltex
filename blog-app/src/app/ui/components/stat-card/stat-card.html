<div id="stat">
  <div class="stat-cards">
    <div class="stat-title">
      <h3>Статистика страницы</h3>
      <button (click)="close()" id="closeBtn" type="button" class="close-stat-btn">
        <mat-icon svgIcon="close"></mat-icon>
      </button>
    </div>
    <div class="stat-container">
      <div class="stat-item p24">
        Всего статей:<br /><span class="count count-posts">{{ postsCount }}</span>
      </div>
      <div class="stat-item p24">Комментарии:<br /><span class="count">0</span></div>
    </div>
  </div>
</div>
