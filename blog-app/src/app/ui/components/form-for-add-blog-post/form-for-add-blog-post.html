@if (isOpen) {
  <section class="add-article">
    <form action="add-text" method="post" class="add-article-form">
      <h2>Добавить статью</h2>
      <div>
        <label for="title"></label>
        <input type="text" id="added-title" name="title" required placeholder="Заголовок" />
      </div>
      <div>
        <label for="content"></label>
        <textarea
          type="text"
          id="added-content"
          name="content"
          required
          placeholder="Текст статьи"
        ></textarea>
      </div>
      <div class="btns-for-new-articles">
        <button type="submit" class="btn btn-submit btn-submit-add-article">Добавить</button>
        <button (click)="close.emit()" type="button" class="btn light-btn close-form-btn">
          Отмена
        </button>
      </div>
    </form>
  </section>
}
