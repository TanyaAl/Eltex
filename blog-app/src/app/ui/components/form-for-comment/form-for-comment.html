<div class="form-comment-container">
  <mat-form-field>
    <mat-label>Ваше имя</mat-label>
    <input matInput />
  </mat-form-field>
  <mat-form-field>
    <mat-label>Комментарий</mat-label>
    <textarea matInput></textarea>
  </mat-form-field>
  <div class="form-comment-btns">
    <button matFab extended class="btn-send-comment">Отправить</button>
    <button matFab extended class="btn-cancel-comment">Отменить</button>
  </div>
</div>
